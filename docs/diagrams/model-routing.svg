<svg viewBox="0 0 780 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Scout model routing diagram</title>
  <desc>Flowchart showing how Scout's Bridge.askClaude routes API calls through three model tiers: Haiku for fast classification, Sonnet for extraction, Opus for all reasoning and generation. Prompt caching applies to the two heaviest Opus nodes.</desc>

  <rect width="780" height="620" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Scout — Model Routing</text>
  <text x="390" y="54" text-anchor="middle" font-size="11.5" fill="#888">every AI call in the app, mapped to its tier</text>

  <!-- Entry -->
  <rect x="290" y="74" width="200" height="38" rx="8" fill="#EBF3FF" stroke="#0A84FF" stroke-width="1.5"/>
  <text x="390" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#0A84FF">Bridge.askClaude(</text>
  <text x="390" y="103" text-anchor="middle" font-size="10.5" fill="#0A84FF">prompt, blocks, opts)</text>

  <line x1="390" y1="112" x2="390" y2="134" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- pickModel diamond -->
  <polygon points="390,135 460,162 390,189 320,162" fill="#f5f5f5" stroke="#555" stroke-width="1.5"/>
  <text x="390" y="158" text-anchor="middle" font-size="10.5" font-weight="600" fill="#111">pickModel(opts)</text>
  <text x="390" y="172" text-anchor="middle" font-size="9.5" fill="#555">opts.fast? / opts.deep?</text>

  <!-- Branch arrows -->
  <line x1="320" y1="162" x2="110" y2="162" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="215" y="154" text-anchor="middle" font-size="10" fill="#888">fast:true</text>

  <line x1="460" y1="162" x2="670" y2="162" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="565" y="154" text-anchor="middle" font-size="10" fill="#888">deep:true</text>

  <line x1="390" y1="189" x2="390" y2="210" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="396" y="204" font-size="10" fill="#888">default</text>

  <!-- HAIKU -->
  <rect x="20" y="178" width="180" height="46" rx="8" fill="#FFF8E7" stroke="#F5A623" stroke-width="1.5"/>
  <text x="110" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#C47D00">⚡ HAIKU 4.5</text>
  <text x="110" y="210" text-anchor="middle" font-size="9.5" fill="#7A5200">$1 / $5 per 1M tok</text>
  <text x="110" y="222" text-anchor="middle" font-size="9" fill="#A06000">fast:true</text>

  <rect x="20" y="238" width="180" height="120" rx="6" fill="#FFFBF0" stroke="#F5A623" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="110" y="253" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7A5200">Classification &amp; Refreshers</text>
  <line x1="30" y1="258" x2="190" y2="258" stroke="#F5A623" stroke-width="0.5"/>
  <text x="35" y="272" font-size="9.5" fill="#555">bgGmailScan</text>
  <text x="35" y="286" font-size="9.5" fill="#555">batchEnsureCompanyInfo</text>
  <text x="35" y="300" font-size="9.5" fill="#555">ensureCompanyInfo</text>
  <text x="35" y="314" font-size="9.5" fill="#555">ensureLeadInfo</text>
  <text x="35" y="350" font-size="9" fill="#888" font-style="italic">inbox scan · company facts</text>

  <!-- SONNET -->
  <rect x="295" y="216" width="190" height="46" rx="8" fill="#F0FFF4" stroke="#34C759" stroke-width="1.5"/>
  <text x="390" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="#1A7A33">◆ SONNET 4.6</text>
  <text x="390" y="248" text-anchor="middle" font-size="9.5" fill="#1A5C26">$3 / $15 per 1M tok</text>
  <text x="390" y="260" text-anchor="middle" font-size="9" fill="#2A7A40">default (no opts)</text>

  <rect x="295" y="274" width="190" height="110" rx="6" fill="#F5FFF7" stroke="#34C759" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="390" y="289" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1A7A33">Extraction Only</text>
  <line x1="305" y1="294" x2="475" y2="294" stroke="#34C759" stroke-width="0.5"/>
  <text x="310" y="308" font-size="9.5" fill="#555">pullJDFromGmail</text>
  <text x="310" y="322" font-size="9.5" fill="#555">liPullFromGmail</text>
  <text x="310" y="336" font-size="9.5" fill="#555">liExtract</text>
  <text x="310" y="350" font-size="9.5" fill="#555">aiParseUpdate</text>
  <text x="390" y="376" font-size="9" fill="#888" font-style="italic" text-anchor="middle">JD · LinkedIn · update parsing</text>

  <!-- OPUS -->
  <rect x="582" y="178" width="180" height="46" rx="8" fill="#F5F0FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="672" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#6D28D9">🟣 OPUS 4.8</text>
  <text x="672" y="210" text-anchor="middle" font-size="9.5" fill="#5B21B6">$5 / $25 per 1M tok</text>
  <text x="672" y="222" text-anchor="middle" font-size="9" fill="#7C3AED">deep:true</text>

  <rect x="562" y="238" width="200" height="250" rx="6" fill="#FAF7FF" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="662" y="253" text-anchor="middle" font-size="9.5" font-weight="600" fill="#6D28D9">Reasoning &amp; Generation</text>
  <line x1="572" y1="258" x2="752" y2="258" stroke="#8B5CF6" stroke-width="0.5"/>

  <!-- Cached group -->
  <rect x="572" y="263" width="180" height="52" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="0.8"/>
  <text x="662" y="276" text-anchor="middle" font-size="9" font-weight="600" fill="#6D28D9">🗃 prompt-cached prefix</text>
  <text x="577" y="290" font-size="9.5" fill="#555">aiInterviewPrep</text>
  <text x="577" y="306" font-size="9.5" fill="#555">enrichInsights</text>

  <text x="577" y="326" font-size="9.5" fill="#555">aiProfileView</text>
  <text x="577" y="340" font-size="9.5" fill="#555">buildProfileFromSources</text>
  <text x="577" y="354" font-size="9.5" fill="#555">runFit</text>
  <text x="577" y="368" font-size="9.5" fill="#555">aiCompanyBrief</text>
  <text x="577" y="382" font-size="9.5" fill="#555">aiTailorDoc</text>
  <text x="577" y="396" font-size="9.5" fill="#555">aiDraftEmail</text>
  <text x="577" y="410" font-size="9.5" fill="#555">loadDiscoverRoles</text>
  <text x="662" y="480" font-size="9" fill="#888" font-style="italic" text-anchor="middle">all narrative generation</text>

  <!-- Proxy layer -->
  <text x="390" y="532" text-anchor="middle" font-size="10.5" font-weight="600" fill="#555">server.js proxy path  (hosted prod)</text>
  <rect x="60" y="540" width="640" height="56" rx="8" fill="#F6F6F6" stroke="#ccc" stroke-width="1.2"/>
  <text x="390" y="558" text-anchor="middle" font-size="9.5" fill="#555">POST /api/ai  ·  parses { fast, deep, cachePrefix, blocks }  ·  model = deep ? DEEP_MODEL : (fast ? FAST_MODEL : MODEL)</text>
  <text x="390" y="574" text-anchor="middle" font-size="9.5" fill="#555">ANTHROPIC_MODEL · ANTHROPIC_FAST_MODEL · ANTHROPIC_DEEP_MODEL  (env-overrideable)</text>
  <text x="390" y="588" text-anchor="middle" font-size="9" fill="#888">logs [ai] model in=… out=… cache_r=… cache_w=… ≈$…  per call</text>

  <!-- Connectors to proxy -->
  <line x1="110" y1="358" x2="110" y2="520" stroke="#F5A623" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="110" y1="520" x2="165" y2="540" stroke="#F5A623" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="390" y1="384" x2="390" y2="540" stroke="#34C759" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="662" y1="488" x2="662" y2="520" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="662" y1="520" x2="615" y2="540" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="60" y="602" width="12" height="10" rx="2" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="0.8"/>
  <text x="77" y="611" font-size="9" fill="#888">prompt-cached prefix (candidateProfile → ~0.1× cost on cache hit)</text>
  <rect x="420" y="602" width="12" height="10" rx="2" fill="#F6F6F6" stroke="#ccc" stroke-width="1"/>
  <text x="437" y="611" font-size="9" fill="#888">debounce removed — every refresh re-runs enrich</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
  </defs>
</svg>
